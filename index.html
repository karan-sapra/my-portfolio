<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="./style.css">  
   
<body>
    <div id="header"></div>
    
    <div class="hero">
        <h1>Hi, I'm Karan Sapra</h1>
        <p>Java Developer | Full-Stack Enthusiast</p>
        <p>Passionate about building scalable applications and solving complex problems.</p>
        <a href="./karan-sapra.pdf" download class="btn btn-lg">Download Resume</a>
    </div>
    <div id="skills"></div>
    <div id="projects"></div>
    <div id="about"></div>
    <div id="footer"></div>
    <script>
       
        function loadComponent(id, file) {
            fetch(file)
                .then(response => response.text())
                .then(data => document.getElementById(id).innerHTML = data);
        }
    
        // Load Header and Footer
        loadComponent("header", "header.html");
        loadComponent("footer", "footer.html");
        loadComponent("skills","skills.html")
        loadComponent("projects","projects.html")
        loadComponent("about","about.html")
        
    </script>
    </body>
    </html>
